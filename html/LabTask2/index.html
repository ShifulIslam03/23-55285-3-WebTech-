    <form>
        <fieldset>
            <legend><h3>Personal Information</h3></legend>
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" maxlength="30" required><br>
            <label>Email</label>
            <input type="email" placeholder=" Enter your email" required><br>
            <label>Gander</label>
            <input type="radio" name="Gander">Male
            <input type="radio" name="Gander">Female
            <input type="radio" name="Gander">Other<br>
            <label>Date of Birth</label>
            <input type="date" required><br>
            <label>Favourite Sports</label>
            <input type="checkbox">Cricket
            <input type="checkbox">Football
            <input type="checkbox">Chess
            <input type="checkbox">Basketball<br>
            <input type="submit">
            <input type="reset">
        </fieldset>
    </form>
</body>
